get:
  summary: Получить список расходников
  tags: [Supplies]
  parameters:
    - name: limit
      in: query
      schema: { type: integer, default: 20, minimum: 1 }
    - name: offset
      in: query
      schema: { type: integer, default: 0, minimum: 0 }
  responses:
    "200":
      description: Успешный список расходников
      content:
        application/json:
          schema:
            type: array
            items: { $ref: "../shemas/supplies.yml#/Supply" }
    "404":
      description: Расходник не найден

put:
  summary: Создать новый расходник
  tags: [Supplies]
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: "../shemas/supplies.yml#/SupplyPut" }
  responses:
    "200":
      description: Расходник успешно вставлен
      content:
        application/json: { $ref: "../shemas/supplies.yml#/Supply" }

delete:
  summary: Удалить расходник
  tags: [Supplies]
  parameters:
    - name: id
      in: query
      schema: { type: integer }
  responses:
    "204": { description: Расходник удалён }
    "404": { description: Не найден }

get:
  summary: Расписание смен
  tags: [Schedules]
  responses:
    "200":
      description: расписание смен
      content:
        application/json:
          schema:
            type: array
            items: { $ref: "../shemas/schedules.yml#/Schedule" }

put:
  summary: Создать смену
  tags: [Schedules]
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: "../shemas/schedules.yml#/Schedule" }
  responses:
    "200":
      description: смена добавлена
      content:
        application/json: { $ref: "../shemas/schedules.yml#/Schedule" }

delete:
  summary: Удалить смену
  tags: [Schedules]
  responses:
    "204":
      description: смена удалена
    "404":
      description: смена не найдена

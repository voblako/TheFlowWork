put:
  summary: войти
  tags: [Users]
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: "../shemas/users.yml#/UserAuth" }
  responses:
    "200":
      description: пользователь вошел
      content:
        application/json: { $ref: "../shemas/users.yml#/UserAuth" }

post:
  summary: регистрация
  tags: [Users]
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: "../shemas/users.yml#/UserAdd" }
  responses:
    "200":
      description: пользователь добавлен
      content:
        application/json: { $ref: "../shemas/users.yml#/UserAdd" }

delete:
  summary: Удалить пользователя
  tags: [Users]
  responses:
    "204":
      description:   пользователь удален
    "404":
      description: пользователь не найден

get:
  summary: получить заявки
  tags: [Requests]
  responses:
    "200":
      description: Список заявок
      content:
        application/json:
          schema:
            type: array
            items: { $ref: "../shemas/requests.yml#/Request" }

put:
  summary: Создать заявку
  tags: [Requests]
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: "../shemas/requests.yml#/Request" }
  responses:
    "200":
      description: Заявка создана
      content:
        application/json: { $ref: "../shemas/requests.yml#/Request" }

delete:
  summary: Удалить заявку
  tags: [Requests]
  responses:
    "204":
      description: заявка удалена
    "404":
      description: заявка не найдена

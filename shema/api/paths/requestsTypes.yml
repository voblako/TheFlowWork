get:
  summary: Типы заявок
  tags: [RequestTypes]
  responses:
    "200":
      description: Список типов заявок
      content:
        application/json:
          schema:
            type: array
            items: { $ref: "../shemas/requests.yml#/RequestType" }

put:
  summary: Создать тип заявки
  tags: [RequestTypes]
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: "../shemas/requests.yml#/RequestTypePut" }
  responses:
    "200":
      description: Тип вставлен
      content:
        application/json: { $ref: "../shemas/requests.yml#/RequestTypePut" }

delete:
  summary: Удалить тип заявки
  tags: [RequestTypes]
  responses:
    "204":
      description: Тип удалён
    "404":
      description: Тип не найден

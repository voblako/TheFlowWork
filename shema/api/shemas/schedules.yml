Schedule:
  type: object
  properties:
    id: { type: integer }
    name: {type: string}
    priority: {type: integer}
    scheduled_time: { type: string, format: date-time }
    executor_id: {type: integer}
    completed_at: { type: string, format: date-time }
  required: [id, name, priority, scheduled_time, executor_id]
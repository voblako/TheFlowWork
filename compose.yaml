services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: "flowwork"
      POSTGRES_USER: "main"
      POSTGRES_PASSWORD: "qwerty"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  pgdata: